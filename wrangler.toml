name = "topstovyklos"
compatibility_date = "2025-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# SMTP credentials must be set as ENCRYPTED secrets (not in this file):
#   wrangler pages secret put SMTP_USERNAME --project-name topstovyklos
#   wrangler pages secret put SMTP_PASSWORD --project-name topstovyklos
# Or via Cloudflare dashboard: Workers & Pages → topstovyklos → Settings →
# Environment variables → add SMTP_USERNAME and SMTP_PASSWORD as encrypted.
